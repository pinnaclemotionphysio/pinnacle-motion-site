<script>
let cart = {};
let delivery = 0;

function addToCart(name, price) {
  if (!cart[name]) {
    cart[name] = {price: price, qty: 1};
  } else {
    cart[name].qty += 1;
  }

  updateCart();
}

function changeQty(name, amount) {
  cart[name].qty += amount;

  if (cart[name].qty <= 0) {
    delete cart[name];
  }

  updateCart();
}

function updateCart() {
  let list = document.getElementById("cartList");
  let itemsTotal = 0;

  list.innerHTML = "";

  for (let name in cart) {
    let item = cart[name];
    let itemTotal = item.price * item.qty;
    itemsTotal += itemTotal;

    let li = document.createElement("li");

    li.innerHTML = `
      ${name} <br>
      <button onclick="changeQty('${name}', -1)">-</button>
      ${item.qty}
      <button onclick="changeQty('${name}', 1)">+</button>
      | R${itemTotal}
      <button onclick="changeQty('${name}', -999)">❌</button>
    `;

    list.appendChild(li);
  }

  let finalTotal = itemsTotal + delivery;
  document.getElementById("cartTotal").innerText = finalTotal;
}

function updateDelivery() {
  let km = document.getElementById("distance").value || 0;
  delivery = km * 5;

  document.getElementById("deliveryCost").innerText = delivery;

  updateCart();
}

function checkout() {
  let message = "Hi, I want to order:%0A";
  let itemsTotal = 0;

  for (let name in cart) {
    let item = cart[name];
    let itemTotal = item.price * item.qty;

    message += `- ${name} x${item.qty} (R${itemTotal})%0A`;
    itemsTotal += itemTotal;
  }

  let finalTotal = itemsTotal + delivery;

  message += "Delivery: R" + delivery + "%0A";
  message += "Total: R" + finalTotal;

  window.open("https://wa.me/27846969164?text=" + message);
}
</script>
